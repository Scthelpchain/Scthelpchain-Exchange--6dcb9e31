<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCT HELPCHAIN | GLOBAL GATEWAY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #FFD700; font-family: sans-serif; text-align: center; padding-top: 100px; margin: 0; }
        .card { border: 1px solid #FFD700; display: inline-block; padding: 40px; border-radius: 20px; background: rgba(255,215,0,0.05); }
        .vault { font-family: monospace; color: #00f3ff; font-size: 14px; margin: 20px 0; }
        .btn { background: #FFD700; color: #000; padding: 15px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .footer { margin-top: 30px; color: #fff; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SCT HELPCHAIN</h1>
        <p>Global Payment Gateway Active</p>
        <div class="vault">Vault: 0xF5D9a35792B389BaeF5e7c8F4a129B557299BB89</div>
        <input type="number" id="amt" style="width:80%; padding:10px; margin-bottom:20px; border-radius:5px; text-align:center;" placeholder="ETH / BNB Amount">
        <br>
        <button class="btn" onclick="startPay()">Execute Fund</button>
        <div class="footer">
            Bkash (Personal): 01974522152<br><br>
            <strong>CHAIRMAN: HABIBUR RAHMAN ANTOR</strong>
        </div>
    </div>

    <script>
        async function startPay() {
            const val = document.getElementById('amt').value;
            if (window.ethereum) {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    const signer = provider.getSigner();
                    const tx = { to: "0xF5D9a35792B389BaeF5e7c8F4a129B557299BB89", value: ethers.utils.parseEther(val) };
                    await signer.sendTransaction(tx);
                    alert("Processing Success!");
                } catch (e) { alert("Failed or Cancelled."); }
            } else { alert("Please Install MetaMask."); }
        }
    </script>
</body>
</html>
