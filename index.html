
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCT HELPCHAIN | GLOBAL AI MADRASA & EXCHANGE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --neon: #00f3ff;
            --bg-deep: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body {
            margin: 0;
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .main-dashboard {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 35px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 243, 255, 0.05);
        }
        .header h1 {
            color: var(--gold);
            text-transform: uppercase;
            font-size: 26px;
            margin: 0;
            letter-spacing: 2px;
        }
        .status-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 15px;
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon);
            border: 1px solid var(--neon);
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }
        .info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }
        .info-item b { font-size: 22px; color: var(--gold); display: block; }
        .info-item label { font-size: 10px; color: #777; text-transform: uppercase; }

        .vault-container {
            background: #000;
            padding: 15px;
            border-radius: 12px;
            border: 1px dashed var(--neon);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--neon);
            margin-bottom: 25px;
            word-break: break-all;
        }
        .input-box {
            width: 100%;
            padding: 18px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            border-radius: 15px;
            color: #fff;
            font-size: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .btn-execute {
            width: 100%;
            padding: 20px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 15px;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.4s;
        }
        .btn-execute:hover { background: #fff; transform: scale(1.02); }

        .local-payment {
            margin-top: 30px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(226, 19, 110, 0.05);
            border: 1px solid rgba(226, 19, 110, 0.2);
        }
        .bkash-id { color: #e2136e; font-weight: 800; font-size: 18px; }

        .footer {
            margin-top: 35px;
            font-size: 10px;
            color: #555;
            line-height: 1.8;
        }
    </style>
</head>
<body>

<div class="main-dashboard">
    <div class="header">
        <h1>SCT HELPCHAIN</h1>
        <div class="status-badge">GLOBAL NETWORK ACTIVE</div>
    </div>

    <div class="info-grid">
        <div class="info-item">
            <b>300+</b>
            <label>Orphan Students</label>
        </div>
        <div class="info-item">
            <b>FREE</b>
            <label>AI Education</label>
        </div>
    </div>

    <div class="vault-container">
        Vault: 0xF5D9a35792B389BaeF5e7c8F4a129B557299BB89
    </div>

    <input type="number" id="sctAmt" class="input-box" placeholder="Amount (ETH / BNB)">
    
    <button class="btn-execute" onclick="executeSCTFund()">
        Connect & Donate
    </button>

    <div class="local-payment">
        <label style="font-size: 9px; color: #888;">LOCAL BKASH (PERSONAL)</label><br>
        <span class="bkash-id">01974522152</span>
    </div>

    <div class="footer">
        <strong>CHAIRMAN: HABIBUR RAHMAN ANTOR (H R ANTOR)</strong><br>
        TIN: 129836322560 | SECURE WEB3 GATEWAY<br>
        © 2026 SCTHELPCHAIN INTERNATIONAL | POWERED BY AI
    </div>
</div>

<script>
    async function executeSCTFund() {
        const val = document.getElementById('sctAmt').value;
        const vault = "0xF5D9a35792B389BaeF5e7c8F4a129B557299BB89";

        if (typeof window.ethereum !== 'undefined') {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();

                if (!val || val <= 0) {
                    alert("Please enter a valid amount.");
                    return;
                }

                const tx = {
                    to: vault,
                    value: ethers.utils.parseEther(val)
                };

                const transaction = await signer.sendTransaction(tx);
                alert("Master Execution Active. Hash: " + transaction.hash.substring(0, 20));
            } catch (err) {
                console.error(err);
                alert("Gateway Interrupted.");
            }
        } else {
            alert("Web3 Wallet Not Detected. Please install MetaMask.");
        }
    }
</script>

</body>
</html>
