
<!DOCTYPE html>

    <style>
        :root { --gold: #FFD700; --neon: #00f3ff; --bg: #050505; }

        .logo { font-size: 30px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 3px; }
        .badge { background: rgba(0, 243, 255, 0.1); color: var(--neon); padding: 7px 20px; border-radius: 25px; font-size: 11px; border: 1px solid var(--neon); display: inline-block; margin-bottom: 25px; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-box { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 25px; border: 1px solid rgba(255, 215, 0, 0.1); transition: 0.3s; }
        .stat-box:hover { border-color: var(--neon); transform: translateY(-5px); }

        .stat-box b { display: block; font-size: 24px; color: #fff; }
        .stat-box label { font-size: 10px; color: #888; text-transform: uppercase; }
        .vault-box { background: #000; padding: 18px; border-radius: 15px; border: 1px dashed var(--neon); font-family: 'Courier New', monospace; font-size: 13px; color: var(--neon); margin-bottom: 25px; word-break: break-all; }
        input { width: 100%; padding: 20px; background: rgba(0,0,0,0.6); border: 1px solid #333; border-radius: 18px; color: #fff; font-size: 22px; text-align: center; margin-bottom: 20px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(255,215,0,0.2); }
        .btn-main { width: 100%; padding: 22px; background: var(--gold); color: #000; border: none; border-radius: 18px; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase; transition: 0.4s; letter-spacing: 1px; }
        .btn-main:hover { background: #fff; transform: scale(1.02); box-shadow: 0 0 30px rgba(255,215,0,0.5); }
        .bkash-footer { margin-top: 35px; padding: 18px; border-radius: 20px; background: rgba(226, 19, 110, 0.08); border: 1px solid rgba(226, 19, 110, 0.3); }
        .bkash-footer b { color: #e2136e; font-size: 20px; letter-spacing: 1px; }
        .legal-footer { font-size: 11px; color: #666; margin-top: 35px; border-top: 1px solid #222; padding-top: 25px; line-height: 1.8; }
    </style>
</head>
<body>

<div class="master-card">

        <i class="fas fa-bolt"></i> Execute Fund
    </button>

    <div class="bkash-footer">
        <label style="font-size: 10px; color: #888; text-transform: uppercase;">Local Bkash (Personal)</label><br>
        <b>01974522152</b>
    </div>

    <div class="legal-footer">
        <strong>CHAIRMAN: HABIBUR RAHMAN ANTOR</strong><br>
        TIN: 129836322560 | SECURE WEB3 GATEWAY<br>
        © 2026 SCTHELPCHAIN INTERNATIONAL | WORLDWIDE ACTIVE
    </div>
</div>

<script>
    async function executeGlobalTransaction() {
        const val = document.getElementById('sctAmt').value;
        const vault = "0xF5D9a35792B389BaeF5e7c8F4a129B557299BB89";
        if (typeof window.ethereum !== 'undefined') {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                if (!val || val <= 0) { alert("Please enter amount."); return; }
                const tx = { to: vault, value: ethers.utils.parseEther(val) };
                const transaction = await signer.sendTransaction(tx);
                alert("Execution Started! Hash: " + transaction.hash.substring(0, 15));
            } catch (err) { alert("Transaction Cancelled."); }
        } else { alert("MetaMask not found! Please install it."); }
    }
</script>
