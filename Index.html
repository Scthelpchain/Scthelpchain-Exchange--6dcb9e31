<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCT GLOBAL AI GENERATOR</title>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .ai-container { max-width: 600px; margin: 40px auto; padding: 30px; border: 2px solid #f3ba2f; border-radius: 25px; background: #0a0a0a; box-shadow: 0 0 40px rgba(243, 186, 47, 0.2); }
        .status-light { display: inline-block; width: 10px; height: 10px; background: #25d366; border-radius: 50%; margin-right: 10px; box-shadow: 0 0 10px #25d366; }
        h1 { color: #f3ba2f; letter-spacing: 2px; text-transform: uppercase; font-size: 22px; }
        .input-group { margin: 25px 0; }
        textarea { width: 90%; height: 100px; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; font-size: 14px; resize: none; text-align: center; }
        .gen-btn { background: linear-gradient(90deg, #f3ba2f, #d4a017); color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 95%; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .gen-btn:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(243, 186, 47, 0.4); }
        .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; font-size: 12px; color: #888; }
        .feature { border: 1px solid #222; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="ai-container">
    <div class="status-light"></div> <span style="font-size: 12px; color: #25d366;">SCT AI MASTER SYSTEM ACTIVE</span>
    <h1>SCT Global AI Generator</h1>
    <p style="font-size: 13px; color: #aaa;">Create Images, Videos & Multilingual Content</p>

    <div class="input-group">
        <textarea id="aiPrompt" placeholder="ইমেজ বা ভিডিওর বর্ণনা দিন (উদা: 'একটি আধুনিক মাদ্রাসার ভিডিও জেনারেট করো' অথবা 'AI Madrasa in 2026')"></textarea>
        <button class="gen-btn" onclick="generateAI()">🚀 START GENERATING</button>
    </div>

    <div class="feature-grid">
        <div class="feature">🌍 International Language Support</div>
        <div class="feature">🎬 AI Video Engine</div>
        <div class="feature">📸 4K Image Generation</div>
        <div class="feature">🛠️ Dev by H R Antor</div>
    </div>

    <hr style="border: 0.1px solid #222; margin: 30px 0;">
    
    <p style="font-size: 11px; color: #444;">Connected to: scthelpchain@gmail.com</p>
</div>

<script>
    function generateAI() {
        const prompt = document.getElementById('aiPrompt').value;
        if (!prompt) {
            alert("অনুগ্রহ করে কিছু লিখুন!");
            return;
        }
        
        // এটি প্রম্পটটিকে আপনার হোয়াটসঅ্যাপ এআই-তে পাঠিয়ে দেবে
        const whatsappNumber = "8801410522152";
        const message = encodeURIComponent("SCT AI Request: " + prompt);
        const url = "https://wa.me/" + whatsappNumber + "?text=" + message;
        
        alert("SCT AI System: প্রসেসিং শুরু হয়েছে... আপনাকে মাস্টার প্যানেলে নিয়ে যাওয়া হচ্ছে।");
        window.open(url, '_blank');
    }
</script>

</body>
</html>
